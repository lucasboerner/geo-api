---
services:
  gateway:
    restart: unless-stopped
    environment:
      # Serve plain HTTP on :80 in the container; published on the host as :8080.
      SERVER_NAME: ${SERVER_NAME:-:80}
      CADDY_SERVER_EXTRA_DIRECTIVES: 'header ?Link `</docs.jsonld>; rel="http://www.w3.org/ns/hydra/core#apiDocumentation"`'
      # The one knob the operator sets in .env — drives both Photon and OSRM.
      REGION: ${REGION:-de}
      # Cache backend toggle (true -> Redis service, anything else -> filesystem).
      ENABLE_REDIS: ${ENABLE_REDIS:-false}
      # Internal upstreams on the compose network (override the public demos in .env).
      PHOTON_URL: http://photon:2322
      OSRM_URL: http://osrm:5000
    depends_on:
      photon:
        condition: service_healthy
      osrm:
        condition: service_healthy
    ports:
      - name: http
        target: 80
        published: ${GATEWAY_PORT:-8080}
        protocol: tcp
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  photon:
    image: rtuszik/photon-docker:latest
    restart: unless-stopped
    environment:
      # Photon accepts country codes / names / continents (de, germany, europe, ...).
      REGION: ${REGION:-de}
    volumes:
      - photon_data:/photon/data
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS 'http://localhost:2322/api?q=test&limit=1' >/dev/null 2>&1 || wget -qO- 'http://localhost:2322/api?q=test&limit=1' >/dev/null 2>&1"
      interval: 30s
      timeout: 10s
      retries: 10
      # First boot downloads a multi-GB prebuilt index; raise for large regions.
      start_period: 600s

  osrm-init:
    image: ghcr.io/project-osrm/osrm-backend:latest
    restart: "no"
    environment:
      REGION: ${REGION:-de}
      GEOFABRIK_URL: ${GEOFABRIK_URL:-}
      OSRM_PROFILE: ${OSRM_PROFILE:-car}
    volumes:
      - osrm_data:/data
      - ./osrm/build.sh:/build.sh:ro
    entrypoint: ["/bin/bash", "/build.sh"]

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    restart: unless-stopped
    command: ["osrm-routed", "--algorithm", "mld", "/data/region.osrm"]
    depends_on:
      osrm-init:
        condition: service_completed_successfully
    volumes:
      - osrm_data:/data
    healthcheck:
      # osrm-routed binds :5000 only once the graph is loaded — TCP liveness via bash.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Activated only when ENABLE_REDIS=true (.env maps it to COMPOSE_PROFILES).
    profiles: ["true"]
    volumes:
      - redis_data:/data

volumes:
  caddy_data:
  caddy_config:
  photon_data:
  osrm_data:
  redis_data:
